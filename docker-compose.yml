x-service: &service
    image: thenewboston-backend:current
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: '/etc/thenewboston/.env'
        required: false
    environment:
      THENEWBOSTON_SETTING_CHANNEL_LAYERS: '{"default":{"CONFIG":{"hosts":[["redis", 6379]]}}}'

services:

  redis:
    image: redis:6.2.6-alpine
    restart: unless-stopped
    ports:
      # TODO(dmu) LOW: Do we need to expose to expose Redis to localhost in production?
      - 127.0.0.1:6379:6379
    volumes:
      - redis-data:/var/lib/redis
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    <<: *service
    command: ./run-django.sh
    ports:
      - 127.0.0.1:8000:8000

volumes:
  redis-data:
    driver: local
